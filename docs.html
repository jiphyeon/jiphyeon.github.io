<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

 <style>
  * {
    box-sizing: border-box;
  }

  :root {
    --text-main: #191919;
    --text-body: #2f2f2f;
    --text-muted: #6f6f6f;
    --line-soft: #ececec;
    --surface-code: #f6f6f3;
    --accent: #df0f57;
    --content-width: 760px;
    --topbar-height: 44px;
    --sidebar-width: 300px;
    --layout-width: 1100px;
    --link-color: #0b6bcb;
    --focus-ring: #1a73e8;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: #fff;
    color: var(--text-main);
    word-break: keep-all;
    overflow-wrap: break-word;
  }

  a {
    color: inherit;
  }

  .sr-only {
    position: absolute !important;
    width: 1px !important;
    height: 1px !important;
    padding: 0 !important;
    margin: -1px !important;
    overflow: hidden !important;
    clip: rect(0, 0, 0, 0) !important;
    white-space: nowrap !important;
    border: 0 !important;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--topbar-height);
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    background: rgba(255, 255, 255, 0.98);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .topbar-inner {
    width: 100%;
    max-width: var(--layout-width);
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
  }

  .topbar-home,
  .topbar-home:visited,
  .topbar-home:hover,
  .topbar-home:active {
    display: flex;
    align-items: center;
    height: 100%;
    font-size: 14px;
    font-weight: 500;
    color: #555;
    text-decoration: none;
    text-underline-offset: 3px;
  }

  .topbar-home:hover {
    text-decoration: underline;
  }

  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
    max-width: var(--layout-width);
    margin: 0 auto;
    height: calc(100vh - var(--topbar-height));
  }

  .sidebar {
    overflow-y: auto;
    border-right: 1px solid var(--line-soft);
    background: #fff;
    padding: 28px 14px 28px;
  }

  .sidebar-inner {
    width: 100%;
  }

  .series-title {
    margin: 0 0 14px;
    padding: 0 8px;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: -0.04em;
    color: var(--text-main);
  }

  .toc {
    display: flex;
    flex-direction: column;
    gap: 2;
  }

  .toc-group {
    margin-bottom: 10px;
  }

  .toc-group-title {
    margin: 16px 0 6px;
    padding: 0 8px;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: #df0f57;
    text-transform: uppercase;
  }

  .toc a {
    display: block;
    padding: 7px 8px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
    line-height: 1.5;
    color: #333;
    transition: background 0.18s ease, color 0.18s ease;
  }

  .toc a:hover {
    background: #f3f3f3;
  }

  .toc a.active {
    background: #f3f3f3;
    color: #111;
    font-weight: 600;
  }

  .main {
    overflow-y: auto;
    background: #fff;
  }

  .content-wrap {
    width: 100%;
    max-width: var(--content-width);
    margin: 0 auto;
    padding: 52px 56px 96px;
  }

  .doc-header {
    margin-bottom: 48px;
    padding-bottom: 0;
    border-bottom: 0;
  }

  .doc-category {
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
  }

  .doc-title {
    margin: 0;
    font-size: 32px;
    font-weight: 600;
    line-height: 1.28;
    letter-spacing: -0.06em;
    color: var(--text-main);
  }

  .doc-meta {
    display: block;
    margin-top: 10px;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--text-muted);
    letter-spacing: -0.01em;
  }

  .content {
    font-size: 18px;
    font-weight: 400;
    line-height: 1.7;
    letter-spacing: -0.03em;
    color: var(--text-body);
    text-align: left;
  }

  .content strong {
    font-weight: 700;
    color: #0f172a;
    background-color: rgba(189, 242, 239, 0.4);
    padding: 0 1px;
    border-radius: 1px;
  }

  .content > *:first-child {
    margin-top: 0 !important;
  }

  .content h1,
  .content h2,
  .content h3,
  .content h4,
  .content h5,
  .content h6 {
    margin-top: 52px;
    margin-bottom: 18px;
    font-weight: 500;
    line-height: 1.4;
    letter-spacing: -0.04em;
    color: var(--text-main);
  }

  .content h1 { font-size: 34px; }
  .content h2 { font-size: 28px; }
  .content h3 { font-size: 23px; }
  .content h4 { font-size: 19px; }
  .content h5 { font-size: 17px; }
  .content h6 { font-size: 15px; }

  .content p {
    margin: 0 0 22px;
  }

  .content a {
    color: var(--link-color);
    text-decoration: underline;
    text-decoration-color: rgba(11, 107, 203, 0.45);
    text-underline-offset: 3px;
    transition: text-decoration-color 0.2s ease;
  }

  .content a:hover {
    text-decoration-color: rgba(11, 107, 203, 0.9);
  }

  .content ul,
  .content ol {
    margin: 0 0 24px;
    padding-left: 1.4em;
    text-align: left;
  }

  .content li {
    margin-bottom: 5px;
    padding-left: 0.1em;
  }

  .content li > ul,
  .content li > ol {
    margin-top: 10px;
    margin-bottom: 10px;
  }

  .content blockquote {
    margin: 28px 0;
    padding: 6px 0 6px 18px;
    border-left: 3px solid #d9d9d9;
    color: #555;
    text-align: left;
  }

  .content hr {
    margin: 40px 0;
    border: 0;
    border-top: 1px solid var(--line-soft);
  }

  .content img {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    margin: 40px 0 48px;
    border-radius: 12px;
  }

  .content code {
    display: inline-block;
    padding: 0.16em 0.45em;
    border-radius: 6px;
    background: var(--surface-code);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9em;
    line-height: 1.6;
    color: #3b3b3b;
    vertical-align: baseline;
  }

  .content pre {
    margin: 28px 0;
    padding: 18px 20px;
    border-radius: 14px;
    background: var(--surface-code);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .content pre code {
    display: block;
    padding: 0;
    background: transparent;
    border-radius: 0;
    font-size: 0.92em;
    line-height: 1.75;
    white-space: pre;
  }

  .reference-heading {
    margin-top: 16px;
    padding-top: 24px;
    font-weight: 600;
  }

  .doc-nav {
    display: flex;
    gap: 24px;
    margin-top: 48px;
    padding-top: 0;
    border-top: 0;
  }

  .doc-nav a,
  .doc-nav .nav-placeholder {
    display: block;
    padding: 0;
    border: 0;
    background: transparent;
    min-height: auto;
    text-decoration: none;
  }

  .doc-nav a:hover {
    background: transparent;
  }

  .doc-nav-next {
    margin-left: auto;
    text-align: right;
  }

  .nav-label {
    display: inline;
    margin-right: 6px;
    font-size: 13px;
    font-weight: 400;
    color: #2f2f2f;
    text-decoration: none !important;
  }

  .doc-nav a:hover .nav-label {
    text-decoration: none !important;
  }

  .nav-title {
    display: inline;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text-main);
    text-decoration: none;
  }

  .doc-nav a:hover .nav-title {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .nav-placeholder {
    display: none;
  }

  .post-footer {
    margin-top: 60px;
    padding-top: 0;
    font-size: 14px;
    line-height: 1.6;
    color: #6f6f6f;
    text-align: left;
  }

  .error {
    color: #b00020;
    font-size: 15px;
    line-height: 1.7;
  }

  .topbar-home:focus-visible,
  .toc a:focus-visible,
  .doc-nav a:focus-visible,
  .content a:focus-visible {
    outline: 3px solid var(--focus-ring);
    outline-offset: 3px;
    border-radius: 4px;
  }

  @media (max-width: 1100px) {
    .layout {
      grid-template-columns: 1fr;
      height: auto;
    }

    .sidebar {
      overflow-y: visible;
      border-right: 0;
      border-bottom: 1px solid var(--line-soft);
      padding: 16px 12px 14px;
    }

    .main {
      overflow-y: visible;
    }

    .series-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .toc-group {
      margin-bottom: 4px;
    }

    .toc-group-title {
      margin: 7px 0 4px;
      font-size: 11px;
    }

    .toc a {
      padding: 4px 8px;
      font-size: 13px;
      line-height: 1.3;
    }

    .content-wrap {
      padding: 36px 18px 72px;
    }

    .doc-title {
      font-size: 36px;
    }

    .doc-nav {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .doc-nav-next {
      margin-left: 0;
      text-align: left;
    }
  }

  @media (max-width: 768px) {
    .topbar-inner {
      padding: 0 16px;
    }

    .content-wrap {
      padding: 28px 18px 64px;
    }

    .doc-header {
      margin-bottom: 40px;
    }

    .doc-title {
      font-size: 31px;
      line-height: 1.3;
    }

    .content {
      font-size: 17px;
      line-height: 1.76;
    }

    .content h1 {
      margin: 44px 0 16px;
      font-size: 24px;
    }

    .content h2 {
      margin: 40px 0 16px;
      font-size: 22px;
    }

    .content h3 {
      margin: 34px 0 14px;
      font-size: 20px;
    }

    .content h4 {
      margin: 28px 0 12px;
      font-size: 17px;
    }

    .content h5 {
      margin: 24px 0 10px;
      font-size: 15px;
    }

    .content h6 {
      margin: 22px 0 8px;
      font-size: 13px;
    }

    .content img {
      margin: 24px 0 32px;
      border-radius: 12px;
    }

    .content pre {
      margin: 24px 0;
      padding: 16px;
      border-radius: 12px;
    }

    .post-footer {
      margin-top: 48px;
      font-size: 12px;
    }
  }
/* ===== Docs 페이지 스크롤바: 오버레이 스타일 ===== */

/* Firefox */
html,
body,
.sidebar,
.main {
  scrollbar-width: thin;
  scrollbar-color: transparent transparent;
}

html:hover,
body:hover,
.sidebar:hover,
.main:hover {
  scrollbar-color: rgba(0, 0, 0, 0.25) transparent;
}

/* Chrome, Edge, Safari */
html::-webkit-scrollbar,
body::-webkit-scrollbar,
.sidebar::-webkit-scrollbar,
.main::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

html::-webkit-scrollbar-track,
body::-webkit-scrollbar-track,
.sidebar::-webkit-scrollbar-track,
.main::-webkit-scrollbar-track {
  background: transparent;
}

html::-webkit-scrollbar-thumb,
body::-webkit-scrollbar-thumb,
.sidebar::-webkit-scrollbar-thumb,
.main::-webkit-scrollbar-thumb {
  background: transparent;
  border-radius: 999px;
}

html:hover::-webkit-scrollbar-thumb,
body:hover::-webkit-scrollbar-thumb,
.sidebar:hover::-webkit-scrollbar-thumb,
.main:hover::-webkit-scrollbar-thumb {
  background: rgba(0, 0, 0, 0.25);
}

html:hover::-webkit-scrollbar-thumb:hover,
body:hover::-webkit-scrollbar-thumb:hover,
.sidebar:hover::-webkit-scrollbar-thumb:hover,
.main:hover::-webkit-scrollbar-thumb:hover {
  background: rgba(0, 0, 0, 0.38);
}
</style>
</head>
<body>
  <a href="#content" class="sr-only">본문 바로가기</a>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="topbar-home">← 메인으로</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <h1 class="series-title" id="seriesTitle">문서</h1>
        <nav class="toc" id="toc" aria-label="문서 목차"></nav>
      </div>
    </aside>

    <main class="main">
      <div class="content-wrap">
        <header class="doc-header">
          <div class="doc-category" id="category"></div>
          <h1 class="doc-title" id="title">불러오는 중</h1>
          <div class="doc-meta" id="meta"></div>
        </header>

        <article class="content" id="content"></article>

        <nav class="doc-nav" aria-label="문서 이전 다음 탐색">
          <div id="prevWrap" class="nav-placeholder" style="display:none;"></div>
          <div id="nextWrap" class="nav-placeholder" style="display:none;"></div>
        </nav>

        <footer class="post-footer">
          ©Jiphyeon. Powered by Vercel+GitHub+Notion.
        </footer>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>

  <script>
    function parseFrontMatter(markdown = "") {
      const match = markdown.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);

      if (!match) {
        return { data: {}, content: markdown };
      }

      const raw = match[1];
      const content = markdown.replace(/^---\s*\n[\s\S]*?\n---\s*\n?/, "");
      const data = {};

      raw.split("\n").forEach(line => {
        const index = line.indexOf(":");
        if (index === -1) return;

        const key = line.slice(0, index).trim();
        const value = line.slice(index + 1).trim();
        data[key] = value;
      });

      return { data, content };
    }

    const params = new URLSearchParams(window.location.search);
    const book = params.get("book");
    const chapter = params.get("chapter");

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function flattenDocs(structure = []) {
      const docs = [];

      structure.forEach((group, groupIndex) => {
        const items = Array.isArray(group.items) ? group.items : [];

        items.forEach((item, itemIndex) => {
          docs.push({
            ...item,
            _groupTitle: group.title || "",
            _groupIndex: groupIndex,
            _itemIndex: itemIndex
          });
        });
      });

      return docs;
    }

    function renderToc(structure = [], currentSlug = "", currentBook = "") {
      const tocEl = document.getElementById("toc");
      if (!tocEl) return;

      tocEl.innerHTML = (structure || []).map(group => {
        const items = Array.isArray(group.items) ? group.items : [];
        const groupTitle = group.title
          ? `<div class="toc-group-title">${escapeHtml(group.title)}</div>`
          : "";

        const links = items.map(item => `
          <a href="/docs.html?book=${encodeURIComponent(currentBook)}&chapter=${encodeURIComponent(item.slug)}"
             class="${item.slug === currentSlug ? "active" : ""}"
             ${item.slug === currentSlug ? 'aria-current="page"' : ""}>
            ${escapeHtml(item.title || "")}
          </a>
        `).join("");

        return `
          <div class="toc-group">
            ${groupTitle}
            ${links}
          </div>
        `;
      }).join("");
    }

    function setupNavigation(list, current, currentBook) {
      const index = list.findIndex(item => item.slug === current.slug);

      const prev = list[index - 1];
      const next = list[index + 1];

      const prevWrap = document.getElementById("prevWrap");
      const nextWrap = document.getElementById("nextWrap");

      if (prevWrap) {
        if (prev) {
          prevWrap.style.display = "block";
          prevWrap.className = "";
          prevWrap.innerHTML = `
            <a href="/docs.html?book=${encodeURIComponent(currentBook)}&chapter=${encodeURIComponent(prev.slug)}">
              <span class="nav-label">이전</span>
              <span class="nav-title">← ${escapeHtml(prev.title)}</span>
            </a>
          `;
        } else {
          prevWrap.style.display = "block";
          prevWrap.className = "nav-placeholder";
          prevWrap.innerHTML = "";
        }
      }

      if (nextWrap) {
        if (next) {
          nextWrap.style.display = "block";
          nextWrap.className = "doc-nav-next";
          nextWrap.innerHTML = `
            <a href="/docs.html?book=${encodeURIComponent(currentBook)}&chapter=${encodeURIComponent(next.slug)}" class="doc-nav-next">
              <span class="nav-label">다음</span>
              <span class="nav-title">${escapeHtml(next.title)} →</span>
            </a>
          `;
        } else {
          nextWrap.style.display = "block";
          nextWrap.className = "nav-placeholder";
          nextWrap.innerHTML = "";
        }
      }
    }

    function applyReferenceHeadingStyle(contentEl) {
      contentEl.querySelectorAll("p, li").forEach((el) => {
        const text = el.textContent.trim().replace(/\s+/g, "");
        if (text.includes("참고자료")) {
          el.classList.add("reference-heading");
        }
      });
    }

    cconst md = window.markdownit({ 
  breaks: false,
  html: true
});

    async function initializeDocsPage() {
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const contentEl = document.getElementById("content");
      const categoryEl = document.getElementById("category");
      const seriesTitleEl = document.getElementById("seriesTitle");

      if (!book) {
        titleEl.textContent = "잘못된 접근";
        contentEl.innerHTML = '<p class="error">book 값이 없습니다.</p>';
        return;
      }

      try {
        const response = await fetch(`/content/books/${encodeURIComponent(book)}/meta.json`, { cache: "no-store" });
        if (!response.ok) throw new Error("meta.json 로드 실패");

        const meta = await response.json();
        const structure = Array.isArray(meta.structure) ? meta.structure : [];
        const docs = flattenDocs(structure);

        seriesTitleEl.textContent = meta.title || "문서";

        if (!docs.length) {
          titleEl.textContent = "문서를 찾을 수 없음";
          contentEl.innerHTML = '<p class="error">챕터가 없습니다.</p>';
          return;
        }

        const current = docs.find(item => item.slug === chapter) || docs[0];

        renderToc(structure, current.slug, book);

        document.title = `${current.title || "Docs"} | ${meta.title || "Jiphyeon"}`;
        titleEl.textContent = current.title || "";
        categoryEl.textContent = current._groupTitle || meta.category || "문서";
        metaEl.textContent = "";

        const markdownResponse = await fetch(
          `/content/books/${encodeURIComponent(book)}/${encodeURIComponent(current.file)}`,
          { cache: "no-store" }
        );

        if (!markdownResponse.ok) throw new Error("Markdown 로드 실패");

        const markdown = await markdownResponse.text();
        const { data: frontMatter, content: cleanedMarkdown } = parseFrontMatter(markdown);

        metaEl.textContent = frontMatter.date || "";
        const processedMarkdown = cleanedMarkdown.replace(/\*\*([^*]+)\*\*/g, ' **$1** ');
contentEl.innerHTML = md.render(processedMarkdown);


        applyReferenceHeadingStyle(contentEl);
        setupNavigation(docs, current, book);
      } catch (error) {
        console.error(error);
        titleEl.textContent = "불러오기 실패";
        contentEl.innerHTML = `<p class="error">${escapeHtml(error.message || "본문을 불러오지 못했습니다.")}</p>`;
      }
    }

    initializeDocsPage();
  </script>
</body>
</html>

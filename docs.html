<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docs</title>

  <style>
    body {
      margin: 0;
      display: flex;
      font-family: "Noto Sans KR", sans-serif;
    }

    .sidebar {
      width: 260px;
      padding: 20px;
      border-right: 1px solid #eee;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar a {
      display: block;
      margin-bottom: 12px;
      font-size: 14px;
      color: #333;
      text-decoration: none;
    }

    .sidebar a.active {
      font-weight: 600;
      color: #df0f57;
    }

    .content {
      flex: 1;
      padding: 40px;
      max-width: 800px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>
<div class="content">
  <h1 id="title"></h1>
  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const series = params.get("series");
const slug = params.get("slug");

fetch("/data/posts.json")
  .then(res => res.json())
  .then(posts => {

    const docs = posts
      .filter(p => p.series === series)
      .sort((a,b) => a.order - b.order);

    const current = docs.find(p => p.slug === slug) || docs[0];

    document.getElementById("sidebar").innerHTML = docs.map(d => `
      <a href="/docs.html?series=${series}&slug=${d.slug}" 
         class="${d.slug === current.slug ? 'active' : ''}">
        ${d.title}
      </a>
    `).join("");

    document.getElementById("title").innerText = current.title;
    document.getElementById("content").innerHTML = `
      <p>${current.excerpt}</p>
      <p>여기에 조항 내용이 들어간다.</p>
    `;
  });
</script>

</body>
</html>

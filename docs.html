<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Docs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text-main: #191919;
      --text-body: #2f2f2f;
      --text-muted: #7b7b7b;
      --line-soft: #ececec;
      --surface-code: #f6f6f3;
      --accent: #df0f57;
      --accent-soft: #f4edf0;

      /* 블로그 타입과 맞출 본문 폭 */
      --content-width: 760px;

      /* 레이아웃 */
      --topbar-height: 56px;
      --sidebar-width: 280px;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: #fff;
      color: var(--text-main);
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: inherit;
    }

    :root {
  --topbar-height: 44px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--topbar-height);
  padding: 0 16px;

  display: flex;              /* 추가 */
  align-items: center;        /* 추가 */

  border-bottom: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.98);
  backdrop-filter: none;
}
.topbar-home {
  display: flex;
  align-items: center;
  height: 100%;
}
    .topbar-home,
    .topbar-home:visited,
    .topbar-home:hover,
    .topbar-home:active {
      font-size: 14px;
      font-weight: 500;
      color: #666;
      text-decoration: none;
      text-underline-offset: 3px;
    }

    .topbar-home:hover {
      text-decoration: underline;
    }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      max-width: 1100px;   /* 핵심 */
  margin: 0 auto;      /* 핵심 */
      height: calc(100vh - var(--topbar-height));
    }

    .sidebar {
      overflow-y: auto;
      border-right: 1px solid var(--line-soft);
      background: #fff;
      padding: 22px 14px 32px;
    }

    .sidebar-inner {
      width: 100%;
    }

    .series-title {
      margin: 0 0 18px;
      padding: 0 10px;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    .toc {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toc-group {
      margin-bottom: 16px;
    }

    .toc-group-title {
      margin: 14px 0 8px;
  padding: 0 10px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: #9a9a9a;
  text-transform: uppercase;
    }

    .toc a {
      display: block;
      padding: 9px 10px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .toc a:hover {
      background: #f7f7f7;
    }

    .toc a.active {
      max-width: 1100px;   /* 핵심 */
  margin: 0 auto;      /* 핵심 */
    }

    .main {
      overflow-y: auto;
      background: #fff;
    }

    .content-wrap {
     width: 100%;
  max-width: 760px;
  margin: 0 auto;
  padding: 52px 56px 96px;
    }

    .doc-header {
      margin-bottom: 28px;
  padding-bottom: 0;
  border-bottom: 0;
    }

    .doc-category {
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
    }

    .doc-title {
      margin: 0;
      font-size: 42px;
      font-weight: 500;
      line-height: 1.28;
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    .doc-meta {
      margin-top: 14px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-muted);
    }

    .content {
      font-size: 18px;
      font-weight: 300;
      line-height: 1.9;
      letter-spacing: -0.03em;
      color: var(--text-body);
      text-align: left;
    }

    .content > *:first-child {
      margin-top: 0 !important;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4,
    .content h5,
    .content h6 {
      margin-top: 52px;
      margin-bottom: 18px;
      font-weight: 500;
      line-height: 1.4;
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    .content h1 { font-size: 34px; }
    .content h2 { font-size: 28px; }
    .content h3 { font-size: 23px; }
    .content h4 { font-size: 19px; }
    .content h5 { font-size: 17px; }
    .content h6 { font-size: 15px; }

    .content p {
      margin: 0 0 22px;
    }

    .content a {
      text-decoration: underline;
      text-decoration-color: rgba(25, 25, 25, 0.28);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s ease, opacity 0.2s ease;
    }

    .content a:hover {
      text-decoration-color: rgba(25, 25, 25, 0.8);
    }

    .content ul,
    .content ol {
      margin: 0 0 24px;
      padding-left: 1.4em;
      text-align: left;
    }

    .content li {
      margin-bottom: 10px;
      padding-left: 0.1em;
    }

    .content li > ul,
    .content li > ol {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .content blockquote {
      margin: 28px 0;
      padding: 6px 0 6px 18px;
      border-left: 3px solid #d9d9d9;
      color: #555;
      text-align: left;
    }

    .content hr {
      margin: 40px 0;
      border: 0;
      border-top: 1px solid var(--line-soft);
    }

    .content img {
      display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  margin: 40px 0 48px;
  border-radius: 12px;
    }

    .content code {
      display: inline-block;
      padding: 0.16em 0.45em;
      border-radius: 6px;
      background: var(--surface-code);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      line-height: 1.6;
      color: #3b3b3b;
      vertical-align: baseline;
    }

    .content pre {
      margin: 28px 0;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--surface-code);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content pre code {
      display: block;
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.92em;
      line-height: 1.75;
      white-space: pre;
    }

    .doc-nav {
       display: flex;
  gap: 24px;
  margin-top: 48px;
  border-top: 0;
  padding-top: 0;
    }

    .doc-nav a,
    .doc-nav .nav-placeholder {
      display: block;
  padding: 0;
  border: 0;
  background: transparent;
  min-height: auto;
    }

    .doc-nav a:hover {
      border-color: #d9d9d9;
      background: #fcfcfc;
    }

    .doc-nav-next {
      text-align: right;
    }

    .nav-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 500;
      color: #8a8a8a;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .nav-title {
      display: block;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--text-main);
    }

    .nav-placeholder {
      border-style: dashed;
      background: #fafafa;
    }

    .post-footer {
      margin-top: 60px;
      padding-top: 0;
      font-size: 15px;
      line-height: 1.6;
      color: #8a8a8a;
      text-align: left;
    }

    .error {
      color: #b00020;
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .sidebar {
        overflow-y: visible;
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
        padding: 20px 14px 16px;
      }

      .main {
        overflow-y: visible;
      }

      .series-title {
        font-size: 20px;
        margin-bottom: 14px;
      }

      .content-wrap {
        padding: 36px 18px 72px;
      }

      .doc-title {
        font-size: 36px;
      }
    }

    @media (max-width: 768px) {
      .topbar {
        padding: 0 16px;
      }

      .content-wrap {
        padding: 28px 18px 64px;
      }

      .doc-header {
        margin-bottom: 48px;
        padding-bottom: 20px;
      }

      .doc-title {
        font-size: 31px;
        line-height: 1.3;
      }

      .doc-meta {
        margin-top: 10px;
        font-size: 14px;
      }

      .content {
        font-size: 17px;
        line-height: 1.76;
      }

      .content h1 {
        margin: 44px 0 16px;
        font-size: 24px;
      }

      .content h2 {
        margin: 40px 0 16px;
        font-size: 22px;
      }

      .content h3 {
        margin: 34px 0 14px;
        font-size: 20px;
      }

      .content h4 {
        margin: 28px 0 12px;
        font-size: 17px;
      }

      .content h5 {
        margin: 24px 0 10px;
        font-size: 15px;
      }

      .content h6 {
        margin: 22px 0 8px;
        font-size: 13px;
      }

      .content img {
        margin: 24px auto;
        border-radius: 12px;
      }

      .content pre {
        margin: 24px 0;
        padding: 16px;
        border-radius: 12px;
      }

      .doc-nav {
        grid-template-columns: 1fr;
      }

      .doc-nav-next {
        text-align: left;
      }

      .post-footer {
        margin-top: 48px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a href="/" class="topbar-home">← 메인으로</a>
    <div></div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <h1 class="series-title" id="seriesTitle">문서</h1>
        <nav class="toc" id="toc"></nav>
      </div>
    </aside>

    <main class="main">
      <div class="content-wrap">
        <header class="doc-header">
          <div class="doc-category" id="category"></div>
          <h1 class="doc-title" id="title">불러오는 중</h1>
          <div class="doc-meta" id="meta"></div>
        </header>

        <article class="content" id="content"></article>

        <nav class="doc-nav">
          <div id="prevWrap" class="nav-placeholder" style="display:none;"></div>
          <div id="nextWrap" class="nav-placeholder" style="display:none;"></div>
        </nav>

        <footer class="post-footer">
          ©Jiphyeon. Powered by GitHub.
        </footer>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const book = params.get("book");
    const chapter = params.get("chapter");

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function flattenDocs(structure = []) {
      const docs = [];

      structure.forEach((group, groupIndex) => {
        const items = Array.isArray(group.items) ? group.items : [];

        items.forEach((item, itemIndex) => {
          docs.push({
            ...item,
            _groupTitle: group.title || "",
            _groupIndex: groupIndex,
            _itemIndex: itemIndex
          });
        });
      });

      return docs;
    }

    function renderToc(structure = [], currentSlug = "", currentBook = "") {
      const tocEl = document.getElementById("toc");
      if (!tocEl) return;

      tocEl.innerHTML = (structure || []).map(group => {
        const items = Array.isArray(group.items) ? group.items : [];
        const groupTitle = group.title
          ? `<div class="toc-group-title">${escapeHtml(group.title)}</div>`
          : "";

        const links = items.map(item => `
          <a href="/docs.html?book=${encodeURIComponent(currentBook)}&chapter=${encodeURIComponent(item.slug)}"
             class="${item.slug === currentSlug ? "active" : ""}">
            ${escapeHtml(item.title || "")}
          </a>
        `).join("");

        return `
          <div class="toc-group">
            ${groupTitle}
            ${links}
          </div>
        `;
      }).join("");
    }

    function setupNavigation(list, current, currentBook) {
      const index = list.findIndex(item => item.slug === current.slug);

      const prev = list[index - 1];
      const next = list[index + 1];

      const prevWrap = document.getElementById("prevWrap");
      const nextWrap = document.getElementById("nextWrap");

      if (prevWrap) {
        if (prev) {
          prevWrap.style.display = "block";
          prevWrap.className = "";
          prevWrap.innerHTML = `
            <a href="/docs.html?book=${encodeURIComponent(currentBook)}&chapter=${encodeURIComponent(prev.slug)}">
              <span class="nav-label">이전</span>
              <span class="nav-title">← ${escapeHtml(prev.title)}</span>
            </a>
          `;
        } else {
          prevWrap.style.display = "block";
          prevWrap.className = "nav-placeholder";
          prevWrap.innerHTML = "";
        }
      }

      if (nextWrap) {
        if (next) {
          nextWrap.style.display = "block";
          nextWrap.className = "doc-nav-next";
          nextWrap.innerHTML = `
            <a href="/docs.html?book=${encodeURIComponent(currentBook)}&chapter=${encodeURIComponent(next.slug)}" class="doc-nav-next">
              <span class="nav-label">다음</span>
              <span class="nav-title">${escapeHtml(next.title)} →</span>
            </a>
          `;
        } else {
          nextWrap.style.display = "block";
          nextWrap.className = "nav-placeholder";
          nextWrap.innerHTML = "";
        }
      }
    }

    marked.setOptions({
      breaks: false,
      gfm: true
    });

    async function initializeDocsPage() {
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const contentEl = document.getElementById("content");
      const categoryEl = document.getElementById("category");
      const seriesTitleEl = document.getElementById("seriesTitle");

      if (!book) {
        titleEl.textContent = "잘못된 접근";
        contentEl.innerHTML = '<p class="error">book 값이 없습니다.</p>';
        return;
      }

      try {
        const response = await fetch(`/content/books/${encodeURIComponent(book)}/meta.json`, { cache: "no-store" });
        if (!response.ok) throw new Error("meta.json 로드 실패");

        const meta = await response.json();
        const structure = Array.isArray(meta.structure) ? meta.structure : [];
        const docs = flattenDocs(structure);

        seriesTitleEl.textContent = meta.title || "문서";

        if (!docs.length) {
          titleEl.textContent = "문서를 찾을 수 없음";
          contentEl.innerHTML = '<p class="error">챕터가 없습니다.</p>';
          return;
        }

        const current = docs.find(item => item.slug === chapter) || docs[0];

        renderToc(structure, current.slug, book);

        document.title = `${current.title || "Docs"} | ${meta.title || "Jiphyeon"}`;
        titleEl.textContent = current.title || "";
        categoryEl.textContent = current._groupTitle || meta.category || "문서";
        metaEl.textContent = "";

        const markdownResponse = await fetch(
          `/content/books/${encodeURIComponent(book)}/${encodeURIComponent(current.file)}`,
          { cache: "no-store" }
        );

        if (!markdownResponse.ok) throw new Error("Markdown 로드 실패");

        const markdown = await markdownResponse.text();
const cleanedMarkdown = markdown.replace(/^---[\s\S]*?---\s*/, "");
contentEl.innerHTML = marked.parse(cleanedMarkdown);

        setupNavigation(docs, current, book);
      } catch (error) {
        console.error(error);
        titleEl.textContent = "불러오기 실패";
        contentEl.innerHTML = `<p class="error">${escapeHtml(error.message || "본문을 불러오지 못했습니다.")}</p>`;
      }
    }

    initializeDocsPage();
  </script>
</body>
</html>

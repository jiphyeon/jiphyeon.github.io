<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Docs</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --text-main:#191919;
  --text-body:#2f2f2f;
  --text-muted:#7b7b7b;
  --line:#ececec;
  --accent:#df0f57;
  --bg:#fff;
}

/* 기본 */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Noto Sans KR",sans-serif;
  color:var(--text-main);
  background:#fff;
}

/* 상단바 */
.topbar{
  height:56px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  position:sticky;
  top:0;
  background:#fff;
  z-index:100;
}

.topbar-left{
  font-size:16px;
  font-weight:500;
}

.topbar-left a{
  text-decoration:none;
  color:inherit;
}

.topbar-right{
  font-size:14px;
  color:#777;
  cursor:pointer;
}

/* 레이아웃 */
.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  height:calc(100vh - 56px);
}

/* 사이드바 */
.sidebar{
  border-right:1px solid var(--line);
  overflow-y:auto;
  padding:24px 16px;
}

.series-title{
  font-size:20px;
  font-weight:500;
  margin-bottom:16px;
}

.toc a{
  display:block;
  padding:8px 10px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
  color:#333;
}

.toc a.active{
  background:#f4edf0;
  color:var(--accent);
}

/* 본문 */
.main{
  overflow-y:auto;
}

.content-wrap{
  max-width:760px;
  margin:0 auto;
  padding:40px 20px 80px;
}

.doc-title{
  font-size:38px;
  font-weight:500;
  margin-bottom:12px;
}

.doc-meta{
  font-size:14px;
  color:var(--text-muted);
  margin-bottom:30px;
}

/* 본문 타이포 (post.html 느낌 유지) */
.content{
  font-size:18px;
  line-height:1.9;
  color:var(--text-body);
}

.content h2{margin-top:48px;font-size:26px}
.content h3{margin-top:36px;font-size:22px}

.content p{margin-bottom:20px}

.content a{
  text-decoration:underline;
  text-underline-offset:3px;
}

/* prev next */
.doc-nav{
  margin-top:60px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.doc-nav a{
  border:1px solid var(--line);
  padding:16px;
  border-radius:12px;
  text-decoration:none;
}

.doc-nav-next{
  text-align:right;
}

/* 모바일 */
@media(max-width:900px){
  .layout{
    grid-template-columns:1fr;
    height:auto;
  }

  .sidebar{
    border-right:0;
    border-bottom:1px solid var(--line);
  }
}
</style>
</head>

<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/">Jiphyeon</a>
  </div>
  <div class="topbar-right">
    Search
  </div>
</div>

<div class="layout">

  <!-- 사이드 -->
  <aside class="sidebar">
    <h1 class="series-title" id="seriesTitle">문서</h1>
    <nav class="toc" id="toc"></nav>
  </aside>

  <!-- 본문 -->
  <main class="main">
    <div class="content-wrap">

      <h1 class="doc-title" id="title"></h1>
      <div class="doc-meta" id="meta"></div>

      <article class="content" id="content"></article>

      <div class="doc-nav">
        <div id="prev"></div>
        <div id="next" class="doc-nav-next"></div>
      </div>

    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const params=new URLSearchParams(location.search);
const book=params.get("book");
const chapter=params.get("chapter");

async function init(){
  const metaRes=await fetch(`/content/books/${book}/meta.json`);
  const meta=await metaRes.json();

  document.getElementById("seriesTitle").textContent=meta.title;

  const docs=[];
  meta.structure.forEach(p=>{
    p.items.forEach(i=>{
      docs.push({...i,part:p.title});
    });
  });

  const current=docs.find(d=>d.slug===chapter)||docs[0];

  /* TOC */
  document.getElementById("toc").innerHTML=docs.map(d=>`
    <a href="?book=${book}&chapter=${d.slug}"
      class="${d.slug===current.slug?'active':''}">
      ${d.title}
    </a>
  `).join("");

  /* 제목 */
  document.getElementById("title").textContent=current.title;

  /* 본문 */
  const md=await fetch(`/content/books/${book}/${current.file}`);
  document.getElementById("content").innerHTML=
    marked.parse(await md.text());

  /* prev next */
  const idx=docs.indexOf(current);

  if(docs[idx-1]){
    document.getElementById("prev").innerHTML=
      `<a href="?book=${book}&chapter=${docs[idx-1].slug}">
        ← ${docs[idx-1].title}
      </a>`;
  }

  if(docs[idx+1]){
    document.getElementById("next").innerHTML=
      `<a href="?book=${book}&chapter=${docs[idx+1].slug}">
        ${docs[idx+1].title} →
      </a>`;
  }
}

init();
</script>

</body>
</html>

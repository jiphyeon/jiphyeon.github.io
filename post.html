<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #111;
    }

    a {
      color: inherit;
    }

    .wrap {
      width: 760px;
      max-width: calc(100% - 32px);
      margin: 72px auto 96px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 32px;
      font-size: 15px;
      color: #666;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .category {
      margin-bottom: 14px;
      font-size: 15px;
      color: #df0f57;
    }

    h1.post-title {
      margin: 0 0 18px;
      font-size: 40px;
      font-weight: 500;
      line-height: 1.28;
      letter-spacing: -0.04em;
    }

    .meta {
      margin-bottom: 40px;
      font-size: 15px;
      color: #777;
    }

    .thumb {
      width: 100%;
      margin-bottom: 40px;
      border-radius: 18px;
      overflow: hidden;
      background: #f3f3f3;
    }

    .thumb img {
      width: 100%;
      display: block;
    }

    .content {
      font-size: 19px;
      font-weight: 300;
      line-height: 1.9;
      letter-spacing: -0.03em;
      color: #222;
    }

    .content h1,
    .content h2,
    .content h3 {
      margin-top: 52px;
      margin-bottom: 18px;
      line-height: 1.4;
      letter-spacing: -0.04em;
      color: #111;
    }

    .content h1 { font-size: 34px; font-weight: 500; }
    .content h2 { font-size: 28px; font-weight: 500; }
    .content h3 { font-size: 23px; font-weight: 500; }

    .content p {
      margin: 0 0 22px;
    }

    .content ul,
    .content ol {
      margin: 0 0 24px 22px;
      padding: 0;
    }

    .content li {
      margin-bottom: 10px;
    }

    .content blockquote {
      margin: 28px 0;
      padding: 2px 0 2px 18px;
      border-left: 3px solid #df0f57;
      color: #444;
    }

    .content img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
      display: block;
      margin: 28px auto;
    }

    .content code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.92em;
    }

    .content pre {
      background: #f7f7f7;
      padding: 18px;
      border-radius: 14px;
      overflow-x: auto;
      margin: 28px 0;
    }

    .content pre code {
      background: transparent;
      padding: 0;
    }

    .error {
      color: #b00020;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .wrap {
        margin: 36px auto 64px;
      }

      h1.post-title {
        font-size: 30px;
      }

      .content {
        font-size: 17px;
        line-height: 1.8;
      }

      .content h1 { font-size: 28px; }
      .content h2 { font-size: 24px; }
      .content h3 { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="back-link">← 메인으로</a>
    <div class="category" id="category"></div>
    <h1 class="post-title" id="title">불러오는 중</h1>
    <div class="meta" id="meta"></div>
    <div class="thumb" id="thumb" style="display:none;"></div>
    <article class="content" id="content"></article>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function initializePostPage() {
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const contentEl = document.getElementById("content");
      const categoryEl = document.getElementById("category");
      const thumbEl = document.getElementById("thumb");

      if (!slug) {
        titleEl.textContent = "잘못된 접근";
        contentEl.innerHTML = '<p class="error">slug 값이 없습니다.</p>';
        return;
      }

      try {
        const postResponse = await fetch("/data/posts.json", { cache: "no-store" });
        if (!postResponse.ok) throw new Error("posts.json 로드 실패");

        const posts = await postResponse.json();
        const post = posts.find(item => item.slug === slug);

        if (!post) {
          titleEl.textContent = "게시물을 찾을 수 없음";
          contentEl.innerHTML = '<p class="error">해당 게시물을 찾을 수 없습니다.</p>';
          return;
        }

        document.title = post.title;
        titleEl.textContent = post.title;
        categoryEl.textContent = post.category || "";
        metaEl.textContent = post.date || "";

        if (post.thumbnail) {
          thumbEl.style.display = "block";
          thumbEl.innerHTML = `<img src="${escapeHtml(post.thumbnail)}" alt="${escapeHtml(post.title)}">`;
        }

        const markdownResponse = await fetch(`/content/${encodeURIComponent(slug)}.md`, { cache: "no-store" });
        if (!markdownResponse.ok) throw new Error("Markdown 로드 실패");

        const markdown = await markdownResponse.text();
        contentEl.innerHTML = marked.parse(markdown);
      } catch (error) {
        console.error(error);
        titleEl.textContent = "불러오기 실패";
        contentEl.innerHTML = '<p class="error">본문을 불러오지 못했습니다.</p>';
      }
    }

    initializePostPage();
  </script>
</body>
</html>

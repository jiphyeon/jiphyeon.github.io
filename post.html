<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text-main: #191919;
      --text-body: #2f2f2f;
      --text-muted: #787878;
      --line-soft: #ececec;
      --surface-soft: #f7f7f5;
      --surface-code: #f6f6f3;
      --accent: #df0f57;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: #fff;
      color: var(--text-main);
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: inherit;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 20px 96px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      text-decoration: none;
      transition: opacity 0.2s ease, text-decoration-color 0.2s ease;
      text-underline-offset: 3px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .post-header {
      margin-bottom: 44px;
    }

    .category {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      margin-bottom: 18px;
      border: none;
      border-radius: 10px;
      background: #f2f2f2;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .post-title {
      margin: 0;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.24;
      letter-spacing: -0.045em;
      color: var(--text-main);
    }

    .meta {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      letter-spacing: -0.01em;
    }

    .thumb {
      margin: 0 0 44px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface-soft);
    }

    .thumb img {
      display: block;
      width: 100%;
      height: auto;
    }

    .content {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.82;
      letter-spacing: -0.04em;
      color: var(--text-body);
      text-align: left;
    }

    .content > *:first-child {
      margin-top: 0 !important;
    }

    .content > *:last-child {
      margin-bottom: 0 !important;
    }

    .content h1,
    .content h2,
    .content h3 {
      color: var(--text-main);
      font-weight: 500;
      letter-spacing: -0.035em;
      text-align: left;
    }

    .content h1 {
      margin: 64px 0 20px;
      font-size: 26px;
      line-height: 1.35;
    }

    .content h2 {
      margin: 56px 0 20px;
      font-size: 24px;
      line-height: 1.34;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-main);
      text-align: left;
    }

    .content h3 {
      margin: 46px 0 18px;
      font-size: 21px;
      line-height: 1.45;
    }

    .content p {
      margin: 0 0 18px;
    }

    .content strong {
      font-weight: 500;
      color: #df0f57;
    }

    .content em {
      font-style: italic;
    }

    .content a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(25, 25, 25, 0.28);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s ease, opacity 0.2s ease;
    }

    .content a:hover {
      text-decoration-color: rgba(25, 25, 25, 0.8);
    }

    .content ul,
    .content ol {
      margin: 0 0 28px;
      padding-left: 1.4em;
      text-align: left;
    }

    .content li {
      margin-bottom: 10px;
      padding-left: 0.1em;
    }

    .content li > ul,
    .content li > ol {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .content blockquote {
      margin: 32px 0;
      padding: 6px 0 6px 18px;
      border-left: 3px solid #d9d9d9;
      color: #555;
      text-align: left;
    }

    .content hr {
      margin: 44px 0;
      border: 0;
      border-top: 1px solid var(--line-soft);
    }

    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 32px auto;
      border-radius: 14px;
    }

    .content code {
      display: inline-block;
      padding: 0.16em 0.45em;
      border-radius: 6px;
      background: var(--surface-code);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      line-height: 1.6;
      color: #3b3b3b;
      vertical-align: baseline;
    }

    .content pre {
      margin: 32px 0;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--surface-code);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content pre code {
      display: block;
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.92em;
      line-height: 1.75;
      white-space: pre;
    }

    .post-footer {
      margin-top: 80px;
      padding-top: 32px;
          font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
      text-align: left;
    }

    .error {
      color: #b00020;
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 36px 18px 72px;
      }

      .back-link {
        margin-bottom: 32px;
        font-size: 14px;
      }

      .post-header {
        margin-bottom: 32px;
      }

      .category {
        margin-bottom: 16px;
        font-size: 12px;
      }

      .post-title {
        font-size: 30px;
        line-height: 1.3;
      }

      .meta {
        margin-top: 4px;
        font-size: 13px;
      }

      .thumb {
        margin-bottom: 32px;
        border-radius: 14px;
      }

      .content {
        font-size: 17px;
        line-height: 1.76;
        text-align: left;
      }

      .content h1 {
        margin-top: 48px;
        font-size: 28px;
      }

      .content h2 {
        margin: 46px 0 18px;
        font-size: 26px;
        line-height: 1.34;
      }

      .content h3 {
        margin: 40px 0 16px;
        font-size: 22px;
        line-height: 1.42;
      }

      .content p {
        margin: 0 0 20px;
      }

      .content ul,
      .content ol {
        padding-left: 1.25em;
      }

      .content blockquote {
        margin: 28px 0;
        padding-left: 16px;
      }

      .content img {
        margin: 28px auto;
        border-radius: 12px;
      }

      .content pre {
        margin: 28px 0;
        padding: 16px;
        border-radius: 12px;
      }

      .post-footer {
        margin-top: 50px;
        padding-top: 24px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="back-link">← 메인으로</a>

    <header class="post-header">
      <div class="category" id="category" style="display:none;"></div>
      <h1 class="post-title" id="title">불러오는 중</h1>
      <div class="meta" id="meta"></div>
    </header>

    <div class="thumb" id="thumb" style="display:none;"></div>
    <article class="content" id="content"></article>

    <footer class="post-footer">
      © Jiphyeon. All rights reserved.
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    marked.setOptions({
      breaks: false,
      gfm: true
    });

    async function initializePostPage() {
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const contentEl = document.getElementById("content");
      const categoryEl = document.getElementById("category");
      const thumbEl = document.getElementById("thumb");

      if (!slug) {
        titleEl.textContent = "잘못된 접근";
        contentEl.innerHTML = '<p class="error">slug 값이 없습니다.</p>';
        return;
      }

      try {
        const postResponse = await fetch("/data/posts.json", { cache: "no-store" });
        if (!postResponse.ok) throw new Error("posts.json 로드 실패");

        const posts = await postResponse.json();
        const post = posts.find(item => item.slug === slug);

        if (!post) {
          titleEl.textContent = "게시물을 찾을 수 없음";
          contentEl.innerHTML = '<p class="error">해당 게시물을 찾을 수 없습니다.</p>';
          return;
        }

        document.title = post.title || "Post";
        titleEl.textContent = post.title || "";
        metaEl.textContent = post.date || "";

        if (post.category || post.categoryLabel) {
          categoryEl.style.display = "inline-flex";
          categoryEl.textContent = post.categoryLabel || post.category;
        }

        if (post.thumbnail) {
          thumbEl.style.display = "block";
          thumbEl.innerHTML = `<img src="${escapeHtml(post.thumbnail)}" alt="${escapeHtml(post.title || "썸네일")}">`;
        }

        const markdownResponse = await fetch(
          `/content/blog/${encodeURIComponent(post.category)}/${encodeURIComponent(slug)}.md`,
          { cache: "no-store" }
        );

        if (!markdownResponse.ok) throw new Error("Markdown 로드 실패");

        const markdown = await markdownResponse.text();
        contentEl.innerHTML = marked.parse(markdown);
      } catch (error) {
        console.error(error);
        titleEl.textContent = "불러오기 실패";
        contentEl.innerHTML = '<p class="error">본문을 불러오지 못했습니다.</p>';
      }
    }

    initializePostPage();
  </script>
</body>
</html>

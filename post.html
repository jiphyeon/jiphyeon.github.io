<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text-main: #191919;
      --text-body: #2f2f2f;
      --text-muted: rgba(255, 255, 255, 0.78);
      --line-soft: #ececec;
      --surface-code: #f6f6f3;
      --accent: #df0f57;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: #fff;
      color: var(--text-main);
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: inherit;
    }

    .back-link-wrap {
     .back-link-wrap {
  position: absolute;
  top: 32px;
  left: 32px;
  z-index: 5;
}
    }

    .back-link {
      display: inline-block;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
      text-underline-offset: 3px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .post-hero {
      position: relative;
      width: 100%;
      min-height: 460px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: #111;
    }

    .post-hero-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    
    .post-hero-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
    }

    .post-hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.28)),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.18));
    }

    .post-hero-inner {
      position: relative;
  z-index: 3;
  width: 100%;
  max-width: 760px;   /* ← 여기만 변경 */
  margin: 0 auto;
  padding: 120px 20px 48px;
    }

    .post-header {
      max-width: 760px;
    }

    .category {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      margin-bottom: 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(6px);
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .post-title {
      margin: 0;
      font-size: 42px;
      font-weight: 500;
      line-height: 1.22;
      letter-spacing: -0.045em;
      color: #fff;
    }

    .meta {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      letter-spacing: -0.01em;
    }

    .content-wrap {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 96px;
    }

    .content {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.82;
      letter-spacing: -0.018em;
      color: #2f2f2f;
      text-align: left;
    }

    .content > *:first-child {
      margin-top: 0 !important;
    }

    .content > *:last-child {
      margin-bottom: 0 !important;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4,
    .content h5,
    .content h6 {
      color: var(--text-main);
      font-weight: 700;
      letter-spacing: -0.035em;
      text-align: left;
    }

    .content h1 {
      margin: 56px 0 18px;
      font-size: 26px;
      line-height: 1.34;
    }

    .content h2 {
      margin: 52px 0 18px;
      font-size: 24px;
      line-height: 1.34;
      letter-spacing: -0.04em;
    }

    .content h3 {
      margin: 42px 0 16px;
      font-size: 21px;
      line-height: 1.42;
    }

    .content h4 {
      margin: 34px 0 14px;
      font-size: 18px;
      line-height: 1.42;
    }

    .content h5 {
      margin: 30px 0 12px;
      font-size: 16px;
      line-height: 1.42;
    }

    .content h6 {
      margin: 26px 0 10px;
      font-size: 14px;
      line-height: 1.42;
    }

    .content p {
      margin: 0 0 18px;
    }

    .content strong {
      font-weight: 500;
      color: #df0f57;
    }

    .content em {
      font-style: italic;
    }

    .content a {
      color: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(25, 25, 25, 0.28);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s ease, opacity 0.2s ease;
    }

    .content a:hover {
      text-decoration-color: rgba(25, 25, 25, 0.8);
    }

    .content ul,
    .content ol {
      margin: 0 0 24px;
      padding-left: 1.4em;
      text-align: left;
    }

    .content li {
      margin-bottom: 10px;
      padding-left: 0.1em;
    }

    .content li > ul,
    .content li > ol {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .content blockquote {
      margin: 28px 0;
      padding: 6px 0 6px 18px;
      border-left: 3px solid #d9d9d9;
      color: #555;
      text-align: left;
    }

    .content hr {
      margin: 40px 0;
      border: 0;
      border-top: 1px solid var(--line-soft);
    }

    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 32px auto;
      border-radius: 14px;
    }

    .content code {
      display: inline-block;
      padding: 0.16em 0.45em;
      border-radius: 6px;
      background: var(--surface-code);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      line-height: 1.6;
      color: #3b3b3b;
      vertical-align: baseline;
    }

    .content pre {
      margin: 28px 0;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--surface-code);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content pre code {
      display: block;
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.92em;
      line-height: 1.75;
      white-space: pre;
    }

    .post-footer {
      margin-top: 40px;
      padding-top: 0;
      font-size: 15px;
      line-height: 1.6;
      color: #8a8a8a;
      text-align: left;
    }

    .error {
      color: #b00020;
      font-size: 15px;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      .back-link-wrap {
        top: 24px;
        left: 18px;
      }

      .post-hero {
        min-height: 380px;
      }

      .post-hero-inner {
        padding: 96px 18px 36px;
      }

      .category {
        margin-bottom: 16px;
        font-size: 12px;
      }

      .post-title {
        font-size: 31px;
        line-height: 1.3;
      }

      .meta {
        margin-top: 8px;
        font-size: 13px;
      }

      .content-wrap {
        padding: 36px 18px 72px;
      }

      .content {
        font-size: 17px;
        line-height: 1.76;
      }

      .content h1 {
        margin: 44px 0 16px;
        font-size: 24px;
      }

      .content h2 {
        margin: 40px 0 16px;
        font-size: 22px;
      }

      .content h3 {
        margin: 34px 0 14px;
        font-size: 20px;
      }

      .content h4 {
        margin: 28px 0 12px;
        font-size: 17px;
      }

      .content h5 {
        margin: 24px 0 10px;
        font-size: 15px;
      }

      .content h6 {
        margin: 22px 0 8px;
        font-size: 13px;
      }

      .content img {
        margin: 24px auto;
        border-radius: 12px;
      }

      .content pre {
        margin: 24px 0;
        padding: 16px;
        border-radius: 12px;
      }

      .post-footer {
        margin-top: 48px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<header class="post-hero">
  <div class="back-link-wrap">
    <a href="/" class="back-link">← 메인으로</a>
  </div>

  <div class="post-hero-bg" id="heroBg" style="display:none;"></div>
  <div class="post-hero-overlay"></div>

  <div class="post-hero-inner">
    <div class="post-header">
      <div class="category" id="category" style="display:none;"></div>
      <h1 class="post-title" id="title">불러오는 중</h1>
      <div class="meta" id="meta"></div>
    </div>
  </div>
</header>

<main class="content-wrap">
  <article class="content" id="content"></article>

  <footer class="post-footer">
    © Jiphyeon. Powered by GitHub Pages.
  </footer>
</main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getThumbnailUrl(post, width = 1600, height = 900) {
      if (post.thumbnail && post.thumbnail.trim() !== "") {
        return post.thumbnail;
      }

      const seed = encodeURIComponent(post.slug || post.title || "jiphyeon");
      return `https://picsum.photos/seed/${seed}/${width}/${height}`;
    }

    marked.setOptions({
      breaks: false,
      gfm: true
    });

    async function initializePostPage() {
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const contentEl = document.getElementById("content");
      const categoryEl = document.getElementById("category");
      const heroBgEl = document.getElementById("heroBg");

      if (!slug) {
        titleEl.textContent = "잘못된 접근";
        contentEl.innerHTML = '<p class="error">slug 값이 없습니다.</p>';
        return;
      }

      try {
        const postResponse = await fetch("/data/posts.json", { cache: "no-store" });
        if (!postResponse.ok) throw new Error("posts.json 로드 실패");

        const posts = await postResponse.json();
        const post = posts.find(item => item.slug === slug);

        if (!post) {
          titleEl.textContent = "게시물을 찾을 수 없음";
          contentEl.innerHTML = '<p class="error">해당 게시물을 찾을 수 없습니다.</p>';
          return;
        }

        document.title = post.title || "Post";
        titleEl.textContent = post.title || "";
        metaEl.textContent = post.date || "";

        if (post.category || post.categoryLabel) {
          categoryEl.style.display = "inline-flex";
          categoryEl.textContent = post.categoryLabel || post.category;
        }

        const heroImageUrl = getThumbnailUrl(post, 1600, 900);
        heroBgEl.style.display = "block";
        heroBgEl.innerHTML = `<img src="https://picsum.photos/1600/900" alt="">`;

        const markdownResponse = await fetch(
          `/content/blog/${encodeURIComponent(post.category)}/${encodeURIComponent(slug)}.md`,
          { cache: "no-store" }
        );

        if (!markdownResponse.ok) throw new Error("Markdown 로드 실패");

        const markdown = await markdownResponse.text();
        contentEl.innerHTML = marked.parse(markdown);
      } catch (error) {
        console.error(error);
        titleEl.textContent = "불러오기 실패";
        contentEl.innerHTML = '<p class="error">본문을 불러오지 못했습니다.</p>';
      }
    }

    initializePostPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text-main: #191919;
      --text-body: #2f2f2f;
      --text-muted: rgba(255, 255, 255, 0.82);
      --line-soft: #ececec;
      --surface-code: #f6f6f3;
      --accent: #df0f57;
      --link-color: #0b6bcb;
      --focus-ring: #1a73e8;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: #fff;
      color: var(--text-main);
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    a {
      color: inherit;
    }

    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    .back-link-wrap {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 1120px;
      z-index: 5;
    }

    .back-link,
    .back-link:visited,
    .back-link:hover,
    .back-link:active {
      display: inline-block;
      font-size: 15px;
      font-weight: 500;
      color: #ffffff !important;
      text-decoration: none;
      text-underline-offset: 3px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .post-hero {
      position: relative;
      width: 100%;
      min-height: 460px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: #111;
    }

    .post-hero-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .post-hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .post-hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to top, rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.18)),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.08));
    }

    .post-hero-inner {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 120px 20px 48px;
    }

    .post-header {
      max-width: 760px;
    }

    .category {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      margin-bottom: 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(6px);
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .post-title {
      margin: 0;
      font-size: 36px;
      font-weight: 500;
      line-height: 1.22;
      letter-spacing: -0.05em;
      color: #fff;
    }

    .meta {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-muted);
      letter-spacing: -0.01em;
    }

    .content-wrap {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 56px 20px 96px;
    }

    .post-layout {
      display: grid;
      grid-template-columns: minmax(0, 760px) 320px;
      gap: 40px;
      align-items: start;
    }

    .content-column {
      min-width: 0;
    }

    .content {
      font-size: 18px;
      font-weight: 400;
      line-height: 1.7;
      letter-spacing: -0.03em;
      color: var(--text-body);
      text-align: left;
    }

    .content > *:first-child {
      margin-top: 0 !important;
    }

    .content > *:last-child {
      margin-bottom: 0 !important;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4,
    .content h5,
    .content h6 {
      color: var(--text-main);
      font-weight: 700;
      letter-spacing: -0.035em;
      text-align: left;
    }

    .content h1 {
      margin: 56px 0 18px;
      font-size: 26px;
      line-height: 1.34;
    }

    .content h2 {
      margin: 52px 0 18px;
      font-size: 24px;
      line-height: 1.34;
      letter-spacing: -0.04em;
    }

    .content h3 {
      margin: 42px 0 16px;
      font-size: 21px;
      line-height: 1.42;
    }

    .content h4 {
      margin: 34px 0 14px;
      font-size: 18px;
      line-height: 1.42;
    }

    .content h5 {
      margin: 30px 0 12px;
      font-size: 16px;
      line-height: 1.42;
    }

    .content h6 {
      margin: 26px 0 10px;
      font-size: 14px;
      line-height: 1.42;
    }

    .content p {
      margin: 0 0 22px;
    }

    .content strong {
      font-weight: 700;
      color: #0f172a;
      background-color: rgba(189, 242, 239, 0.4);
      padding: 0 1px;
      border-radius: 1px;
    }

    .content em {
      font-style: italic;
    }

    .content a {
      color: var(--link-color);
      text-decoration: underline;
      text-decoration-color: rgba(11, 107, 203, 0.45);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s ease;
    }

    .content a:hover {
      text-decoration-color: rgba(11, 107, 203, 0.9);
    }

    .content ul,
    .content ol {
      margin: 0 0 24px;
      padding-left: 1.4em;
      text-align: left;
    }

    .content li {
      margin-bottom: 10px;
      padding-left: 0.1em;
    }

    .content li > ul,
    .content li > ol {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .content blockquote {
      margin: 28px 0;
      padding: 6px 0 6px 18px;
      border-left: 3px solid #d9d9d9;
      color: #555;
      text-align: left;
    }

    .content hr {
      margin: 40px 0;
      border: 0;
      border-top: 1px solid var(--line-soft);
    }

    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 32px auto;
      border-radius: 14px;
      cursor: zoom-in;
    }

    .content code {
      display: inline-block;
      padding: 0.16em 0.45em;
      border-radius: 6px;
      background: var(--surface-code);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      line-height: 1.6;
      color: #3b3b3b;
      vertical-align: baseline;
    }

    .content pre {
      margin: 28px 0;
      padding: 18px 20px;
      border-radius: 14px;
      background: var(--surface-code);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .content pre code {
      display: block;
      padding: 0;
      background: transparent;
      border-radius: 0;
      font-size: 0.92em;
      line-height: 1.75;
      white-space: pre;
    }

    .post-footer {
      margin-top: 60px;
      padding-top: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #6f6f6f;
      text-align: left;
    }

    .related-sidebar {
      min-width: 0;
      padding-top: 22px;
    }

    .related-sidebar-inner {
      position: sticky;
      top: 32px;
      max-height: calc(100vh - 64px);
      overflow-y: auto;
      padding-right: 6px;
    }

    .related-sidebar-inner::-webkit-scrollbar {
      width: 8px;
    }

    .related-sidebar-inner::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.16);
      border-radius: 999px;
    }

    .related-title {
      margin: 0 0 24px;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.03em;
      color: var(--text-main);
    }

    .related-list {
      display: grid;
      gap: 14px;
    }

    .related-card {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      text-decoration: none;
      color: inherit;
      padding: 0;
    }

    .related-card:hover .related-card-post-title {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .related-card.is-current {
      background: #ececec;
      border-radius: 14px;
      padding: 10px;
    }

    .related-thumb {
      width: 112px;
      aspect-ratio: 16 / 10;
      border-radius: 12px;
      overflow: hidden;
      background: #f2f2f2;
      flex-shrink: 0;
    }

    .related-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .related-thumb-fallback {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .related-card-body {
      min-width: 0;
    }

    .related-card-post-title {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: -0.02em;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .related-date {
      font-size: 13px;
      line-height: 1.5;
      color: #7a7a7a;
    }

    .error {
      color: #b00020;
      font-size: 15px;
      line-height: 1.7;
    }

    .back-link:focus-visible,
    .content a:focus-visible,
    .related-card:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 3px;
      border-radius: 4px;
    }

    .image-lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      z-index: 9999;
      cursor: zoom-out;
    }

    .image-lightbox.is-open {
      display: flex;
    }

    .image-lightbox img {
      max-width: min(1200px, 92vw);
      max-height: 88vh;
      width: auto;
      height: auto;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      cursor: default;
    }

    .image-lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 40px;
      line-height: 1;
      cursor: pointer;
    }

    @media (max-width: 1180px) {
      .back-link-wrap {
        max-width: 760px;
      }

      .post-hero-inner {
        max-width: 760px;
      }

      .content-wrap {
        max-width: 760px;
      }

      .post-layout {
        grid-template-columns: minmax(0, 1fr);
        gap: 48px;
      }

      .related-sidebar-inner {
        position: static;
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }
    }

    @media (max-width: 768px) {
      .back-link-wrap {
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 36px);
      }

      .post-hero {
        min-height: 380px;
      }

      .post-hero-inner {
        padding: 96px 18px 36px;
      }

      .category {
        margin-bottom: 16px;
        font-size: 12px;
      }

      .post-title {
        font-size: 31px;
        line-height: 1.3;
      }

      .meta {
        margin-top: 8px;
        font-size: 13px;
      }

      .content-wrap {
        padding: 36px 18px 72px;
      }

      .content {
        font-size: 17px;
        line-height: 1.76;
      }

      .content h1 {
        margin: 44px 0 16px;
        font-size: 24px;
      }

      .content h2 {
        margin: 40px 0 16px;
        font-size: 22px;
      }

      .content h3 {
        margin: 34px 0 14px;
        font-size: 20px;
      }

      .content h4 {
        margin: 28px 0 12px;
        font-size: 17px;
      }

      .content h5 {
        margin: 24px 0 10px;
        font-size: 15px;
      }

      .content h6 {
        margin: 22px 0 8px;
        font-size: 13px;
      }

      .content img {
        margin: 24px auto;
        border-radius: 12px;
      }

      .content pre {
        margin: 24px 0;
        padding: 16px;
        border-radius: 12px;
      }

      .post-footer {
        margin-top: 48px;
        font-size: 12px;
      }

      .related-card {
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 12px;
      }

      .related-thumb {
        width: 96px;
        border-radius: 10px;
      }

      .related-card.is-current {
        border-radius: 12px;
      }

      .related-title {
        font-size: 17px;
      }

      .related-card-post-title {
        font-size: 14px;
      }

      .related-date {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <a href="#content" class="sr-only">본문 바로가기</a>

  <header class="post-hero">
    <div class="back-link-wrap">
      <a href="/" class="back-link">← 메인으로</a>
    </div>

    <div class="post-hero-bg" id="heroBg" style="display:none;"></div>
    <div class="post-hero-overlay"></div>

    <div class="post-hero-inner">
      <div class="post-header">
        <div class="category" id="category" style="display:none;"></div>
        <h1 class="post-title" id="title">불러오는 중</h1>
        <div class="meta" id="meta"></div>
      </div>
    </div>
  </header>

  <main class="content-wrap">
    <div class="post-layout">
      <article class="content-column">
        <article class="content" id="content"></article>

        <footer class="post-footer">
          ©Jiphyeon.
        </footer>
      </article>

      <aside class="related-sidebar" aria-label="같은 카테고리 글">
        <div class="related-sidebar-inner">
          <h2 class="related-title" id="relatedTitle"></h2>
          <div class="related-list" id="relatedList"></div>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <script>
    function parseFrontMatter(markdown = "") {
      const match = markdown.match(/^---\s*\n([\s\S]*?)\n---\s*\n?/);

      if (!match) {
        return { data: {}, content: markdown };
      }

      const raw = match[1];
      const content = markdown.replace(/^---\s*\n[\s\S]*?\n---\s*\n?/, "");
      const data = {};

      raw.split("\n").forEach(line => {
        const index = line.indexOf(":");
        if (index === -1) return;

        const key = line.slice(0, index).trim();
        const value = line.slice(index + 1).trim();
        data[key] = value;
      });

      return { data, content };
    }

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    const gradientPalette = [
      "#F4F5FA",
      "#D4EAFF",
      "#F1FF62",
      "#0192C6",
      "#004499",
      "#112358"
    ];

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizePath(value = "") {
      const path = String(value).trim();

      if (!path) return "";

      if (
        path.startsWith("http://") ||
        path.startsWith("https://") ||
        path.startsWith("//") ||
        path.startsWith("/")
      ) {
        return path;
      }

      return `/${path.replace(/^\.?\//, "")}`;
    }

    function getThumbnailUrl(post) {
      const thumbnail = normalizePath(post.thumbnail || "");
      return thumbnail || "";
    }

    function getSeedHash(seedText = "") {
      let hash = 0;

      for (let i = 0; i < seedText.length; i += 1) {
        hash = seedText.charCodeAt(i) + ((hash << 5) - hash);
        hash |= 0;
      }

      return Math.abs(hash);
    }

    function getGradientColors(seedText = "") {
      const hash = getSeedHash(seedText || "jiphyeon");
      const length = gradientPalette.length;

      const color1 = gradientPalette[hash % length];
      const color2 = gradientPalette[(hash + 2) % length];
      const color3 = gradientPalette[(hash + 4) % length];

      return [color1, color2, color3];
    }

    function createSeededGradient(seedText = "") {
      const [color1, color2, color3] = getGradientColors(seedText);

      return `
        linear-gradient(
          135deg,
          ${color1} 0%,
          ${color1} 18%,
          ${color2} 56%,
          ${color3} 100%
        )
      `.trim();
    }

    function setHeroBackground(heroBgEl, post) {
      const seed = encodeURIComponent(post.slug || post.title || "jiphyeon");
      const heroImageUrl = `https://picsum.photos/seed/${seed}/1600/900`;

      heroBgEl.style.display = "block";
      heroBgEl.style.backgroundImage = "";
      heroBgEl.innerHTML = `<img src="${heroImageUrl}" alt="">`;
    }

    function bindContentImageLightbox() {
      const lightbox = document.getElementById("image-lightbox");
      const lightboxImg = document.getElementById("image-lightbox-img");
      const closeBtn = document.getElementById("image-lightbox-close");

      if (!lightbox || !lightboxImg || !closeBtn) return;

      const contentImages = document.querySelectorAll(".content img");

      function openLightbox(img) {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt || "";
        lightbox.classList.add("is-open");
        lightbox.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.classList.remove("is-open");
        lightbox.setAttribute("aria-hidden", "true");
        lightboxImg.src = "";
        lightboxImg.alt = "";
        document.body.style.overflow = "";
      }

      contentImages.forEach((img) => {
        img.style.cursor = "zoom-in";
        img.onclick = () => openLightbox(img);
      });

      closeBtn.onclick = closeLightbox;

      lightbox.onclick = (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      };

      document.onkeydown = (event) => {
        if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
          closeLightbox();
        }
      };
    }

    function getFirstContentImageUrl(container) {
      if (!container) return "";

      const images = Array.from(container.querySelectorAll("img"));
      const validImage = images.find((img) => {
        const src = (img.getAttribute("src") || "").trim();
        if (!src) return false;
        if (src.startsWith("data:")) return false;
        return true;
      });

      return validImage ? validImage.src : "";
    }

    function buildRelatedCard(post, currentSlug, thumbnailUrl) {
      const isCurrent =
        (post.slug || "").trim().toLowerCase() ===
        (currentSlug || "").trim().toLowerCase();

      const fallbackGradient = createSeededGradient(post.slug || post.title || "jiphyeon");

      return `
        <a class="related-card${isCurrent ? " is-current" : ""}" href="/post.html?slug=${encodeURIComponent(post.slug || "")}">
          <div class="related-thumb">
            ${
              thumbnailUrl
                ? `<img src="${escapeHtml(thumbnailUrl)}" alt="">`
                : `<div class="related-thumb-fallback" style="background-image: ${fallbackGradient};"></div>`
            }
          </div>
          <div class="related-card-body">
            <p class="related-card-post-title">${escapeHtml(post.title || "")}</p>
            <div class="related-date">${escapeHtml(post.date || "")}</div>
          </div>
        </a>
      `;
    }

    function renderRelatedPosts(posts, currentPost, contentEl) {
      const relatedListEl = document.getElementById("relatedList");
      if (!relatedListEl || !currentPost || !(currentPost.category || currentPost.categoryLabel)) {
        return;
      }

      const currentCategory = currentPost.category || currentPost.categoryLabel;
      const sameCategoryPosts = posts.filter((item) => {
        const itemCategory = item.category || item.categoryLabel;
        return itemCategory === currentCategory;
      });

      if (sameCategoryPosts.length <= 1) {
        relatedListEl.innerHTML = "";
        return;
      }

      const firstImageUrl = getFirstContentImageUrl(contentEl);

      const relatedMarkup = sameCategoryPosts
        .map((item) => {
          const thumbnailUrl =
            item.slug === currentPost.slug
              ? firstImageUrl
              : getThumbnailUrl(item);

          return buildRelatedCard(item, currentPost.slug, thumbnailUrl);
        })
        .join("");

      relatedListEl.innerHTML = relatedMarkup;
    }

    const md = window.markdownit({ breaks: false });

    async function initializePostPage() {
      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const contentEl = document.getElementById("content");
      const categoryEl = document.getElementById("category");
      const heroBgEl = document.getElementById("heroBg");
      const relatedListEl = document.getElementById("relatedList");
      const relatedTitleEl = document.getElementById("relatedTitle");

      if (!slug) {
        titleEl.textContent = "잘못된 접근";
        contentEl.innerHTML = '<p class="error">slug 값이 없습니다.</p>';
        return;
      }

      try {
        const postResponse = await fetch("/data/posts.json", { cache: "no-store" });
        if (!postResponse.ok) throw new Error("posts.json 로드 실패");

        const posts = await postResponse.json();
        const post = posts.find(item => item.slug === slug);

        if (!post) {
          titleEl.textContent = "게시물을 찾을 수 없음";
          contentEl.innerHTML = '<p class="error">해당 게시물을 찾을 수 없습니다.</p>';
          return;
        }

        document.title = post.title || "Post";
        titleEl.textContent = post.title || "";
        metaEl.textContent = "";

        if (post.category || post.categoryLabel) {
          const currentCategoryName = post.categoryLabel || post.category;
          categoryEl.style.display = "inline-flex";
          categoryEl.textContent = currentCategoryName;

          if (relatedTitleEl) {
            relatedTitleEl.textContent = currentCategoryName;
          }
        } else {
          if (relatedListEl) {
            relatedListEl.innerHTML = "";
          }
          if (relatedTitleEl) {
            relatedTitleEl.textContent = "";
          }
        }

        setHeroBackground(heroBgEl, post);

        const markdownResponse = await fetch(`/${post.file}`, {
          cache: "no-store"
        });

        if (!markdownResponse.ok) throw new Error("Markdown 로드 실패");

        const markdown = await markdownResponse.text();
        const { data: frontMatter, content: cleanedMarkdown } = parseFrontMatter(markdown);

        metaEl.textContent = frontMatter.date || post.date || "";

        const processedMarkdown = cleanedMarkdown.replace(/\*\*([^*]+)\*\*/g, " **$1** ");
        contentEl.innerHTML = md.render(processedMarkdown);

        renderRelatedPosts(posts, post, contentEl);
        bindContentImageLightbox();

      } catch (error) {
        console.error(error);
        titleEl.textContent = "불러오기 실패";
        contentEl.innerHTML = '<p class="error">본문을 불러오지 못했습니다.</p>';
      }
    }

    initializePostPage();
  </script>

  <div id="image-lightbox" class="image-lightbox" aria-hidden="true">
    <button class="image-lightbox-close" id="image-lightbox-close" aria-label="이미지 닫기">×</button>
    <img id="image-lightbox-img" src="" alt="">
  </div>
</body>
</html>

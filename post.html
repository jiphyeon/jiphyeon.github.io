<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://jiphyeon.github.io/css/common.css">
</head>
<body>
  <a href="#content" class="sr-only">본문 바로가기</a>

  <div class="sticky-header" id="stickyHeader" aria-hidden="true">
    <div class="sticky-header-inner">
      <a href="/" class="sticky-home">← 메인으로</a>
      <div class="sticky-title" id="stickyTitle"></div>
    </div>
  </div>

  <header class="post-hero" id="postHero">
    <div class="back-link-wrap">
      <a href="/" class="back-link">← 메인으로</a>
    </div>

    <div class="post-hero-bg" id="heroBg" style="display:none;"></div>
    <div class="post-hero-overlay"></div>

    <div class="post-hero-inner">
      <div class="post-header">
        <div class="category" id="category" style="display:none;"></div>
        <h1 class="post-title" id="title">불러오는 중</h1>
        <div class="meta" id="meta"></div>
      </div>
    </div>
  </header>

  <main class="content-wrap">
    <div class="post-layout">
      <article class="content-column">
        <article class="content" id="content"></article>

        <footer class="post-footer">
          ©Jiphyeon. Powered by Vercel+GitHub+Notion.
        </footer>
      </article>

      <aside class="related-sidebar" id="relatedSidebar" aria-label="같은 카테고리 글">
        <div class="related-sidebar-inner">
          <h2 class="related-title" id="relatedTitle"></h2>
          <div class="related-list" id="relatedList"></div>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <script src="/js/common.js"></script>
  <script src="/js/post.js"></script>
  <div id="image-lightbox" class="image-lightbox" aria-hidden="true">
    <button class="image-lightbox-close" id="image-lightbox-close" aria-label="이미지 닫기">×</button>
    <img id="image-lightbox-img" src="" alt="">
  </div>
</body>
</html>

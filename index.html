<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Blog</title>

  <!-- Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    * {
      box-sizing: border-box;
    }

    .container {
      width: 1200px;
      max-width: calc(100% - 32px);
      margin: 40px auto;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .card {
      width: 260px;
      display: flex;
      flex-direction: column;
      flex: 0 0 260px;
    }

    .post-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .image-wrap {
      width: 100%;
      height: 420px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      border-radius: 16px; /* 라운딩 더 확대 */
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      transition: transform 0.3s ease;
    }

    .text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      margin-top: 18px;
    }

    .title {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.34;
      letter-spacing: -0.03em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-decoration: none;
    }

    .desc {
 margin-top: 12px;
  font-size: 16px;
  font-weight: 500;   /* 핵심: 400 → 500 */
  color: #333;        /* 핵심: 더 진하게 */
  line-height: 1.58;
  letter-spacing: -0.02em;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
    }

    .tags {
     display: flex;
  gap: 10px;
  margin-top: 14px;
    }

    .tag {
     font-size: 15px;        /* 본문급으로 */
  font-weight: 400;
  color: #6b7280;         /* 임시, 나중에 변경 */
  text-decoration: none;
    }

    .tag:hover {
      opacity: 0.7;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    .card:hover .title,
    .card:hover .desc {
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-thickness: 1px;
    }

    @media (max-width: 768px) {
      .container {
        width: 100%;
        max-width: 100%;
        margin: 24px auto;
        padding: 0 16px;
        flex-direction: column;
        gap: 32px;
      }

      .card {
        width: 100%;
        flex: none;
      }

      .image-wrap {
        height: auto;
      }

      .title {
        font-size: 20px;
      }

      .desc {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <a href="https://example.com/post-1" class="post-link">
      <div class="image-wrap">
        <img src="https://picsum.photos/300/400" alt="">
      </div>
    </a>
    <div class="text">
      <a href="https://example.com/post-1" class="post-link">
        <div class="title">긴 제목 테스트입니다 두 줄까지 들어갑니다 확인용</div>
      </a>
      <a href="https://example.com/post-1" class="post-link">
        <div class="desc">이건 설명입니다 세 줄까지만 보여야 합니다 자연스럽게 잘리는지 확인합니다.</div>
      </a>
      <div class="tags">
        <a href="https://example.com/tag/ai" class="tag">#AI</a>
      </div>
    </div>
  </div>

  <div class="card">
    <a href="https://example.com/post-2" class="post-link">
      <div class="image-wrap">
        <img src="https://picsum.photos/300/350" alt="">
      </div>
    </a>
    <div class="text">
      <a href="https://example.com/post-2" class="post-link">
        <div class="title">짧은 제목</div>
      </a>
      <a href="https://example.com/post-2" class="post-link">
        <div class="desc">짧은 설명</div>
      </a>
      <div class="tags">
        <a href="https://example.com/tag/ux" class="tag">#UX</a>
      </div>
    </div>
  </div>

  <div class="card">
    <a href="https://example.com/post-3" class="post-link">
      <div class="image-wrap">
        <img src="https://picsum.photos/300/450" alt="">
      </div>
    </a>
    <div class="text">
      <a href="https://example.com/post-3" class="post-link">
        <div class="title">또 다른 카드 제목입니다 테스트 중입니다</div>
      </a>
      <a href="https://example.com/post-3" class="post-link">
        <div class="desc">조금 더 긴 설명을 넣어서 높이 차이를 만들어 봅니다. 레이아웃이 어떻게 보이는지 확인합니다.</div>
      </a>
      <div class="tags">
        <a href="https://example.com/tag/content" class="tag">#콘텐츠</a>
      </div>
    </div>
  </div>

  <div class="card">
    <a href="https://example.com/post-4" class="post-link">
      <div class="image-wrap">
        <img src="https://picsum.photos/300/380" alt="">
      </div>
    </a>
    <div class="text">
      <a href="https://example.com/post-4" class="post-link">
        <div class="title">네 번째 카드</div>
      </a>
      <a href="https://example.com/post-4" class="post-link">
        <div class="desc">설명입니다</div>
      </a>
      <div class="tags">
        <a href="https://example.com/tag/strategy" class="tag">#전략</a>
      </div>
    </div>
  </div>

</div>

</body>
</html>

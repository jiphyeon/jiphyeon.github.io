<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Blog</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f7f7;
    }

    * {
      box-sizing: border-box;
    }

    .container {
      width: 1200px;
      max-width: calc(100% - 32px);
      margin: 40px auto;
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .card {
      width: 260px;
      display: flex;
      flex-direction: column;
      flex: 0 0 260px;
    }

    .image-wrap {
      width: 100%;
      height: 420px;
      display: flex;
      align-items: flex-end;
    }

    .card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
      transition: transform 0.3s;
    }

    .text {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
      align-items: flex-start;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .desc {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tag {
      font-size: 12px;
      color: #888;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    @media (max-width: 768px) {
      .container {
        width: 100%;
        max-width: 100%;
        margin: 24px auto;
        padding: 0 16px;
        flex-direction: column;
        gap: 32px;
      }

      .card {
        width: 100%;
        flex: none;
      }

      .image-wrap {
        height: auto;
      }

      .title {
        font-size: 20px;
      }

      .desc {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <a href="#" class="card">
    <div class="image-wrap">
      <img src="https://picsum.photos/300/400">
    </div>
    <div class="text">
      <div class="title">긴 제목 테스트입니다 두 줄까지 들어갑니다 확인용</div>
      <div class="desc">이건 설명입니다 세 줄까지만 보여야 합니다 자연스럽게 잘리는지 확인합니다.</div>
      <div class="tag">AI / 데이터</div>
    </div>
  </a>

  <a href="#" class="card">
    <div class="image-wrap">
      <img src="https://picsum.photos/300/350">
    </div>
    <div class="text">
      <div class="title">짧은 제목</div>
      <div class="desc">짧은 설명</div>
      <div class="tag">UX</div>
    </div>
  </a>

  <a href="#" class="card">
    <div class="image-wrap">
      <img src="https://picsum.photos/300/450">
    </div>
    <div class="text">
      <div class="title">또 다른 카드 제목입니다 테스트 중입니다</div>
      <div class="desc">조금 더 긴 설명을 넣어서 높이 차이를 만들어 봅니다. 레이아웃이 어떻게 보이는지 확인합니다.</div>
      <div class="tag">콘텐츠</div>
    </div>
  </a>

  <a href="#" class="card">
    <div class="image-wrap">
      <img src="https://picsum.photos/300/380">
    </div>
    <div class="text">
      <div class="title">네 번째 카드</div>
      <div class="desc">설명입니다</div>
      <div class="tag">전략</div>
    </div>
  </a>

</div>

</body>
</html>

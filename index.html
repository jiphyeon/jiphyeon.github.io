<script>
const params = new URLSearchParams(window.location.search);
const category = params.get("category");

/* =========================
   기본 유틸
========================= */
function escapeHtml(value = "") {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getPostUrl(post) {
  return `/post.html?slug=${encodeURIComponent(post.slug)}`;
}

/* =========================
   🔥 핵심: 이미지 자동 fallback
========================= */
const categoryImageMap = {
  "경영기법": "business",
  "기술비평": "technology",
  "비주얼 브리프": "minimal design",
  "EU AI Act": "europe law",
  "공공정보화의 불편한 진실": "city architecture"
};

function getFallbackKeyword(post) {
  return categoryImageMap[post.category] || "landscape";
}

function getThumbnailUrl(post) {
  if (post.thumbnail && post.thumbnail.trim() !== "") {
    return post.thumbnail;
  }

  const keyword = encodeURIComponent(getFallbackKeyword(post));
  return `https://source.unsplash.com/800x600/?${keyword}`;
}

/* =========================
   카드 생성
========================= */
function createCard(post) {
  return `
    <a href="${getPostUrl(post)}" class="card">
      <div class="card-image">
        <img src="${escapeHtml(getThumbnailUrl(post))}" 
             alt="${escapeHtml(post.title)}" 
             loading="lazy">
      </div>
      <div class="card-content">
        <div class="category">${escapeHtml(post.category)}</div>
        <h3>${escapeHtml(post.title)}</h3>
        <p>${escapeHtml(post.excerpt || "")}</p>
      </div>
    </a>
  `;
}

/* =========================
   데이터 로딩
========================= */
async function loadPosts() {
  const res = await fetch("/posts.json");
  const posts = await res.json();

  let filtered = posts;

  if (category) {
    filtered = posts.filter(p => p.category === category);
  }

  const container = document.getElementById("posts");

  if (!filtered.length) {
    container.innerHTML = "<p>포스트가 없습니다.</p>";
    return;
  }

  container.innerHTML = filtered.map(createCard).join("");
}

loadPosts();
</script>
